name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-marketing:
    name: Build Marketing Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/marketing/package-lock.json
      - name: Install dependencies
        run: cd apps/marketing && npm ci
      - name: Build
        run: cd apps/marketing && npx next build

  type-check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install console proxy deps
        run: cd apps/console-proxy && npm ci
      - name: Syntax check console proxy
        run: |
          cd apps/console-proxy
          find api database lib middleware scripts -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Install SDK deps
        run: cd packages/sdk && npm ci
      - name: Build SDK
        run: cd packages/sdk && npx tsc

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run core engine tests
        run: |
          node --test services/vienna-lib/test/policy-suggestions.test.js

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit console proxy
        run: cd apps/console-proxy && npm ci && npm audit --omit=dev --audit-level=high || true
      - name: Audit SDK
        run: cd packages/sdk && npm ci && npm audit --omit=dev --audit-level=high || true
      - name: Check for hardcoded secrets
        run: |
          # Fail if any real secrets are found (not patterns/examples)
          if grep -rn 'sk-ant-api\|npg_[A-Za-z0-9]\{20\}' --include='*.ts' --include='*.js' --include='*.json' . \
            | grep -v node_modules | grep -v .git | grep -v package-lock | grep -v '\.test\.' | grep -v example | grep -v '\.env\.'; then
            echo "::error::Potential hardcoded secrets found!"
            exit 1
          fi
