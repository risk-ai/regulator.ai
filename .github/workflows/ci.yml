name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: |
          cd apps/console/server && npm ci
          cd ../../.. && cd packages/sdk && npm ci
      - name: Type check console server
        run: cd apps/console/server && npx tsc --noEmit --skipLibCheck || true
      - name: Build SDK
        run: cd packages/sdk && npx tsc
      - name: Build marketing site
        run: cd apps/marketing && npm ci && npx next build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run core engine tests
        run: node --test services/vienna-lib/test/*.test.js
      - name: Run integration tests
        run: node scripts/integration-test.js || true

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit console server
        run: cd apps/console/server && npm audit --omit=dev || true
      - name: Audit SDK
        run: cd packages/sdk && npm audit --omit=dev || true