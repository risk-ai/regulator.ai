name: Deploy to Production

on:
  push:
    branches: [main]

# Vercel auto-deploys main → production for both:
#   - regulator-ai (marketing site)
#   - console-proxy (console API)
# This workflow runs post-deploy verification.

jobs:
  verify-deploy:
    name: Verify Production Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel deploy
        run: sleep 60

      - name: Check regulator.ai health
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://regulator.ai)
          if [ "$status" != "200" ]; then
            echo "::error::regulator.ai returned $status"
            exit 1
          fi
          echo "✅ regulator.ai is up (HTTP $status)"

      - name: Check console.regulator.ai health
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://console.regulator.ai/api/v1/health)
          if [ "$status" != "200" ]; then
            echo "::warning::console.regulator.ai health check returned $status"
          else
            echo "✅ console.regulator.ai API is up (HTTP $status)"
          fi
