name: Deploy to Staging

on:
  pull_request:
    branches: [main]

# Vercel handles preview deploys automatically for PRs.
# This workflow is a placeholder for additional staging checks.

jobs:
  staging-checks:
    name: Pre-merge Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Vercel preview deploy
        run: |
          echo "Vercel auto-deploys previews for PRs linked to regulator-ai project."
          echo "Check the PR comments for the preview URL."
          echo "Manual staging deploy: use Vercel dashboard or vercel --preview CLI."
