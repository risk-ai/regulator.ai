version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: vienna-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: vienna_dev
    ports:
      - "5432:5432"
    volumes:
      - vienna-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  vienna-postgres-data:
    driver: local
