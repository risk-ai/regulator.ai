# Vienna OS — Local Development Environment
# Usage: docker compose up
version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vienna_dev
      POSTGRES_USER: vienna
      POSTGRES_PASSWORD: vienna_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vienna"]
      interval: 5s
      timeout: 5s
      retries: 5

  console:
    build:
      context: .
      dockerfile: apps/console/server/Dockerfile
    environment:
      PORT: 3100
      NODE_ENV: development
      POSTGRES_URL: postgres://vienna:vienna_dev@postgres:5432/vienna_dev
      VIENNA_OPERATOR_PASSWORD: vienna-dev
      VIENNA_SESSION_SECRET: dev-secret-not-for-production
      JWT_SECRET: dev-jwt-secret
      VIENNA_WARRANT_KEY: dev-warrant-key
      CORS_ORIGIN: http://localhost:5173,http://localhost:3100
    ports:
      - "3100:3100"
    depends_on:
      postgres:
        condition: service_healthy

  marketing:
    build:
      context: .
      dockerfile: apps/marketing/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production

volumes:
  postgres_data: