version: '3.8'

services:
  # Next.js Product Shell
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - VIENNA_RUNTIME_BASE_URL=http://vienna-runtime:4001
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://localhost:3000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - vienna-runtime
    command: npm run dev

  # Vienna Runtime Service
  vienna-runtime:
    build:
      context: ./services/vienna-runtime
      dockerfile: Dockerfile
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - NODE_ENV=development
      - VIENNA_STATE_BACKEND=memory
      - VIENNA_ARTIFACT_BACKEND=filesystem
      - VIENNA_DATA_DIR=/data
      - CORS_ORIGINS=http://localhost:3000
    volumes:
      - ./services/vienna-runtime:/app
      - /app/node_modules
      - vienna-data:/data
    command: npm run dev

volumes:
  vienna-data:
