# Vienna OS — Local Development Environment
# 
# SETUP:
# 1. cp .env.example .env.local
# 2. Edit .env.local and add your ANTHROPIC_API_KEY
# 3. docker compose up
#
# URLS:
# - Backend: http://localhost:3100
# - Frontend: http://localhost:5173
# - Database: localhost:5432 (postgres/vienna:vienna_dev)

version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vienna_dev
      POSTGRES_USER: vienna
      POSTGRES_PASSWORD: vienna_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vienna"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: 3100
      NODE_ENV: development
      DATABASE_URL: postgres://vienna:vienna_dev@postgres:5432/vienna_dev
      JWT_SECRET: dev-jwt-secret-change-in-production
      CORS_ORIGIN: http://localhost:5173,http://localhost:3100
      # Required for AI governance (add your key to .env.local)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Optional AI providers
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      # Session management
      SESSION_SECRET: dev-session-secret-change-in-production
    ports:
      - "3100:3100"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Mount .env.local for API keys (create this file with your ANTHROPIC_API_KEY)
      - ./.env.local:/app/.env.local:ro
      # Optional: Mount current directory for development
      # - .:/app:delegated
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: apps/console
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: http://localhost:3100
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data: