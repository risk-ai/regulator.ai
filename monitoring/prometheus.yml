# Prometheus configuration for Vienna OS
#
# Usage:
#   prometheus --config.file=monitoring/prometheus.yml
#
# Or with Docker:
#   docker run -p 9090:9090 -v ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml prom/prometheus

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'vienna-os'
    # Scrape the /metrics endpoint on the Vienna OS console server
    # Adjust the target to match your deployment:
    #   - Local dev: localhost:3001
    #   - Docker: console:3001
    #   - Production: console.regulator.ai
    static_configs:
      - targets: ['localhost:3001']
    metrics_path: '/metrics'
    scheme: 'http'
